<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sincronizando con Cadence...</title>
  <style>
    body {
      background-color: #0d0d1a;
      color: #a855f7;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .spinner {
      border: 3px solid rgba(168, 85, 247, 0.1);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border-left-color: #a855f7;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p style="font-size: 13px; font-weight: bold; letter-spacing: 0.05em; text-transform: uppercase;">
    Sincronizando cuenta con Cadence...
  </p>

  <script>
    // 1. Extraer los parámetros del hash de la URL (#access_token=...)
    const hash = window.location.hash;
    
    if (hash) {
      // 2. Enviar el hash de vuelta a la ventana principal de Cadence
      if (window.opener) {
        window.opener.postMessage({
          type: 'META_OAUTH_SUCCESS',
          hash: hash
        }, window.location.origin);
      }
    } else {
      if (window.opener) {
        window.opener.postMessage({
          type: 'META_OAUTH_ERROR',
          error: 'No se recibieron credenciales en el retorno de Meta.'
        }, window.location.origin);
      }
    }
    
    // 3. Cerrar el popup inmediatamente
    window.close();
  </script>
</body>
</html>
