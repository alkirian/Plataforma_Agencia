<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadence - Conectar Meta Ads</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #0b0b14;
      color: #f3f4f6;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: linear-gradient(135deg, #16162a 0%, #0f0f1e 100%);
      border: 1px solid rgba(168, 85, 247, 0.25);
      border-radius: 24px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 50px rgba(168,85,247,0.1);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(168,85,247,0.07) 0%, transparent 60%);
      pointer-events: none;
    }
    .logo {
      width: 64px; height: 64px;
      background: rgba(168,85,247,0.1);
      border: 1.5px solid #a855f7;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px auto;
      box-shadow: 0 0 20px rgba(168,85,247,0.3);
    }
    .logo svg { width: 32px; height: 32px; fill: #a855f7; }
    h1 {
      font-size: 20px; font-weight: 800; margin-bottom: 10px;
      background: linear-gradient(to right, #ffffff, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }
    p { font-size: 13px; color: #9ca3af; line-height: 1.6; margin-bottom: 28px; }
    .fb-btn {
      background-color: #1877f2; color: white;
      border: none; border-radius: 12px;
      padding: 14px 20px; font-size: 15px; font-weight: bold;
      width: 100%; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(24,119,242,0.4);
    }
    .fb-btn:active { transform: scale(0.97); background-color: #166fe5; }
    .fb-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .spinner {
      width: 22px; height: 22px;
      border: 3px solid rgba(255,255,255,0.3);
      border-left-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-msg {
      margin-top: 20px; padding: 12px 16px;
      border-radius: 12px; font-size: 12px; line-height: 1.5;
      display: none;
    }
    .status-msg.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
    .status-msg.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #34d399; }
    .info-box {
      margin-top: 20px; padding: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      font-size: 11px; color: #6b7280; text-align: left; line-height: 1.4;
    }
    /* Ocultar el div raíz del SDK de Facebook */
    #fb-root { display: none; }
  </style>
</head>
<body>
  <div id="fb-root"></div>

  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24">
        <path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.989C18.343 21.129 22 16.99 22 12c0-5.523-4.477-10-10-10z"/>
      </svg>
    </div>
    <h1>Conectar Meta Ads</h1>
    <p>Iniciá sesión en Facebook desde este dispositivo para vincular tu cuenta publicitaria con Cadence.</p>

    <button id="connectBtn" class="fb-btn">
      <svg width="20" height="20" fill="white" viewBox="0 0 24 24">
        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
      </svg>
      <span id="btnText">Conectar con Facebook</span>
      <div id="btnSpinner" class="spinner" style="display:none;"></div>
    </button>

    <div id="statusMsg" class="status-msg"></div>

    <div class="info-box">
      🔒 <strong>Seguridad Garantizada:</strong> Cadence nunca accede a tus credenciales. La conexión se realiza directamente con los servidores de Facebook mediante su SDK oficial.
    </div>
  </div>

  <script>
    // ─── Parámetros de la URL ────────────────────────────────────────────
    const urlParams = new URLSearchParams(window.location.search);
    const clientId  = urlParams.get('clientId');
    const state     = urlParams.get('state');
    const appId     = urlParams.get('appId');
    const apiBaseUrl = decodeURIComponent(urlParams.get('apiBaseUrl') || '');

    const connectBtn  = document.getElementById('connectBtn');
    const btnText     = document.getElementById('btnText');
    const btnSpinner  = document.getElementById('btnSpinner');
    const statusMsg   = document.getElementById('statusMsg');

    function showStatus(msg, type = 'error') {
      statusMsg.textContent = msg;
      statusMsg.className = `status-msg ${type}`;
      statusMsg.style.display = 'block';
    }

    function setLoading(loading) {
      connectBtn.disabled = loading;
      btnText.style.display = loading ? 'none' : 'inline';
      btnSpinner.style.display = loading ? 'block' : 'none';
    }

    // ─── Validación inicial ───────────────────────────────────────────────
    if (!clientId || !state || !appId || !apiBaseUrl) {
      showStatus('Parámetros incompletos. Por favor, genera un nuevo código QR desde tu computadora.');
      connectBtn.disabled = true;
    }

    // ─── Inicializar SDK de Facebook ─────────────────────────────────────
    window.fbAsyncInit = function() {
      FB.init({
        appId   : appId,
        cookie  : true,
        xfbml   : false,
        version : 'v21.0'
      });
    };

    // Cargar el SDK de Facebook
    (function(d, s, id) {
      var js, fjs = d.getElementsByTagName(s)[0];
      if (d.getElementById(id)) return;
      js = d.createElement(s); js.id = id;
      js.src = "https://connect.facebook.net/es_LA/sdk.js";
      fjs.parentNode.insertBefore(js, fjs);
    }(document, 'script', 'facebook-jssdk'));

    // ─── Botón de conexión ───────────────────────────────────────────────
    connectBtn.addEventListener('click', function() {
      if (!window.FB) {
        showStatus('El SDK de Facebook aún no se cargó. Intenta de nuevo en unos segundos.');
        return;
      }

      const scope = [
        'ads_read',
        'ads_management',
        'business_management',
        'pages_show_list',
        'pages_read_engagement',
        'pages_read_user_content',
        'instagram_basic',
        'instagram_manage_comments',
        'pages_manage_posts',
        'instagram_content_publish',
        'pages_manage_engagement'
      ].join(',');

      FB.login(function(response) {
        if (response.authResponse && response.authResponse.accessToken) {
          const shortLivedToken = response.authResponse.accessToken;
          setLoading(true);
          btnText.textContent = 'Enviando credenciales...';

          // Enviar el token al backend de Cadence
          fetch(`${apiBaseUrl}/shared/meta-mobile/callback`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ clientId, state, shortLivedToken })
          })
          .then(function(res) { return res.json(); })
          .then(function(result) {
            setLoading(false);
            if (result.success) {
              showStatus('✓ ¡Vinculación exitosa! Vuelve a tu computadora para seleccionar tu cuenta publicitaria. Esta pantalla se cerrará en 5 segundos.', 'success');
              connectBtn.style.display = 'none';
              setTimeout(function() { window.close(); }, 5000);
            } else {
              showStatus(result.message || 'Error al registrar la vinculación. Intenta de nuevo.');
            }
          })
          .catch(function(err) {
            setLoading(false);
            console.error(err);
            showStatus('Error de red al contactar el servidor de Cadence. Asegúrate de estar en la misma red WiFi que tu computadora.');
          });

        } else if (response.status === 'not_authorized') {
          showStatus('Autorizaste el acceso de Cadence a Facebook. Intenta de nuevo.');
        } else {
          showStatus('No se completó el inicio de sesión en Facebook. Intenta de nuevo.');
        }
      }, { scope: scope, return_scopes: true });
    });
  </script>
</body>
</html>
