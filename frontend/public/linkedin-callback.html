<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sincronizando LinkedIn con Cadence...</title>
  <style>
    body {
      background-color: #0d0d1a;
      color: #0077b5;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .spinner {
      border: 3px solid rgba(0, 119, 181, 0.1);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border-left-color: #0077b5;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p style="font-size: 13px; font-weight: bold; letter-spacing: 0.05em; text-transform: uppercase;">
    Sincronizando LinkedIn con Cadence...
  </p>

  <script>
    // Extraer el código temporal enviado en la query (?code=...)
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    
    if (code) {
      if (window.opener) {
        window.opener.postMessage({
          type: 'LINKEDIN_OAUTH_SUCCESS',
          code: code
        }, window.location.origin);
      }
    } else {
      const error = params.get('error_description') || 'No se recibieron credenciales en el retorno de LinkedIn.';
      if (window.opener) {
        window.opener.postMessage({
          type: 'LINKEDIN_OAUTH_ERROR',
          error: error
        }, window.location.origin);
      }
    }
    window.close();
  </script>
</body>
</html>
