<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sincronizando con Cadence...</title>
  <style>
    body {
      background-color: #0b0b14;
      color: #f3f4f6;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .card {
      background: linear-gradient(135deg, #16162a 0%, #0f0f1e 100%);
      border: 1px solid rgba(168, 85, 247, 0.25);
      border-radius: 24px;
      padding: 40px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 50px rgba(168, 85, 247, 0.1);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .spinner {
      border: 3.5px solid rgba(168, 85, 247, 0.15);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border-left-color: #a855f7;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px auto;
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
    }
    .success-icon {
      width: 56px;
      height: 56px;
      background: rgba(16, 185, 129, 0.1);
      border: 2px solid #10b981;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px auto;
      box-shadow: 0 0 25px rgba(16, 185, 129, 0.35);
      color: #10b981;
      font-size: 28px;
      font-weight: bold;
    }
    .error-icon {
      width: 56px;
      height: 56px;
      background: rgba(239, 68, 68, 0.1);
      border: 2px solid #ef4444;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px auto;
      box-shadow: 0 0 25px rgba(239, 68, 68, 0.35);
      color: #ef4444;
      font-size: 28px;
      font-weight: bold;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 {
      font-size: 20px;
      font-weight: 800;
      margin: 0 0 10px 0;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 13px;
      color: #9ca3af;
      line-height: 1.6;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="spinner" class="spinner"></div>
    <div id="successIcon" class="success-icon">✓</div>
    <div id="errorIcon" class="error-icon">✗</div>
    
    <h1 id="statusTitle">Vinculando con Cadence...</h1>
    <p id="statusDesc">Por favor espera, estamos transfiriendo las credenciales seguras de Meta Ads a tu sesión de escritorio.</p>
  </div>

  <script>
    const spinner = document.getElementById('spinner');
    const successIcon = document.getElementById('successIcon');
    const errorIcon = document.getElementById('errorIcon');
    const statusTitle = document.getElementById('statusTitle');
    const statusDesc = document.getElementById('statusDesc');

    // 1. Extraer los parámetros del hash de la URL (#access_token=...)
    const hashParams = new URLSearchParams(window.location.hash.replace('#', '?'));
    const accessToken = hashParams.get('access_token');
    
    // 2. Extraer y parsear el state de los parámetros de consulta (query string)
    const queryParams = new URLSearchParams(window.location.search);
    const fbStateRaw = queryParams.get('state');

    async function sendTokenToBackend() {
      if (!accessToken) {
        showError("No se recibió ningún access token de Meta. Por favor, vuelve a intentarlo.");
        return;
      }

      if (!fbStateRaw) {
        showError("Estado de sesión inválido o faltante.");
        return;
      }

      try {
        const config = JSON.parse(decodeURIComponent(fbStateRaw));
        const { clientId, state, apiBaseUrl } = config;

        if (!clientId || !state || !apiBaseUrl) {
          showError("Parámetros de configuración de la sesión corruptos.");
          return;
        }

        // Enviar POST a la API pública de Callback
        const response = await fetch(`${apiBaseUrl}/shared/meta-mobile/callback`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            clientId,
            state,
            shortLivedToken: accessToken
          })
        });

        const result = await response.json();

        if (response.ok && result.success) {
          showSuccess();
        } else {
          showError(result.message || "Error al registrar la vinculación en el servidor.");
        }
      } catch (err) {
        console.error(err);
        showError("Falla de red o de formato de sesión.");
      }
    }

    function showSuccess() {
      spinner.style.display = 'none';
      successIcon.style.display = 'flex';
      statusTitle.textContent = "¡Vinculación Exitosa!";
      statusTitle.style.color = "#10b981";
      statusDesc.textContent = "Las credenciales han sido transferidas de forma segura. Ya puedes volver a tu computadora para seleccionar tu cuenta publicitaria.";
      
      // Auto-cerrar la pestaña después de 5 segundos
      setTimeout(() => {
        window.close();
      }, 5000);
    }

    function showError(message) {
      spinner.style.display = 'none';
      errorIcon.style.display = 'flex';
      statusTitle.textContent = "Error de Vinculación";
      statusTitle.style.color = "#ef4444";
      statusDesc.textContent = message;
    }

    // Ejecutar el envío al cargar la página
    sendTokenToBackend();
  </script>
</body>
</html>
